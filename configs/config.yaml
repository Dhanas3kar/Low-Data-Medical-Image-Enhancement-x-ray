project:
  name: Low-Data Medical Image Enhancement
  description: X-ray image enhancement using deep learning with limited training data
  version: 0.2.0

data:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  image_size: 256
  batch_size: 8
  num_workers: 0

model:
  architecture: "UNet"  # alternatives: ResUNet, XrayEnhancementNet
  in_channels: 1
  out_channels: 1
  depth: 3
  dropout: 0.2

training:
  epochs: 150
  learning_rate: 0.0005
  lr_step_size: 20
  lr_gamma: 0.5
  optimizer: "Adam"  # alternatives: AdamW, SGD
  loss_function: "L1"  # alternatives: L1, SSIM, Perceptual
  early_stopping_patience: 20
  save_interval: 10
  print_interval: 1

augmentation:
  enabled: true
  rotation_range: 20
  horizontal_flip: true
  vertical_flip: false
  brightness_range: [0.8, 1.2]
  gaussian_blur: true
  elastic_deform: false

regularization:
  weight_decay: 0.0001
  batch_norm: true
  dropout: 0.2

paths:
  data_dir: "./data"
  model_dir: "./models"
  output_dir: "./outputs"
  logs_dir: "./logs"

inference:
  device: "cuda"  # auto, cpu, cuda
  batch_size: 4
  save_visuals: true
